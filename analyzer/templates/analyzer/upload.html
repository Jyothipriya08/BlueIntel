<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueIntel - Upload Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e293b; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 1.5rem; }
        input[type="file"] { margin: 1rem 0; color: #94a3b8; }
        button { background-color: #0284c7; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #0369a1; }
        .result-box { margin-top: 1.5rem; background-color: #0f172a; padding: 1rem; border-radius: 6px; text-align: left; font-family: monospace; font-size: 0.85rem; border: 1px solid #334155; display: none; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ BlueIntel Portal</h2>
    <p style="color: #94a3b8; font-size: 0.9rem;">Select a file to calculate its unique cryptographic hash.</p>
    
    <form id="uploadForm">
        <input type="file" id="fileInput" required><br>
        <button type="submit">Analyze File</button>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('fileInput');
        const resultBox = document.getElementById('result');
        
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        resultBox.style.display = 'block';
        resultBox.innerText = 'Analyzing file...';

        try {
            const response = await fetch('/api/v1/upload/', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            resultBox.innerText = JSON.stringify(data, null, 2);
        } catch (error) {
            resultBox.innerText = 'Error connecting to the analysis engine.';
        }
    });
</script>

</body>
</html>
